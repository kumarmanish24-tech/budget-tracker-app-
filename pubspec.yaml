name: ex27
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  sqflite: ^2.4.2+1
  path_provider: ^2.1.6
  intl: ^0.20.3
  lottie: ^3.3.3
  shared_preferences: ^2.5.5
  animated_text_kit: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.6

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/bg/
    - assets/lotties/

flutter_native_splash:
  color: "#1E3D59"

  image: assets/icons/bus.png

  android: true
  ios: true
  web: false

  fullscreen: true

  android_12:
    color: "#1E3D59"
    image: assets/icons/bus.png

    # Uncomment if you have a branding image
    # branding: assets/icons/branding.png
    # branding_bottom_padding: 24